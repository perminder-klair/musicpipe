{% if stats.error %}
    <div class="text-rose-400 text-xs">navidrome: {{ stats.error }}</div>
{% else %}
    <div class="flex items-baseline gap-1.5 text-sm">
        <span class="text-zinc-400">Artists</span>
        <span class="tabular-nums text-zinc-100 font-medium">{{ stats.artists if stats.artists is not none else '—' }}</span>
    </div>
    <div class="flex items-baseline gap-1.5 text-sm">
        <span class="text-zinc-400">Albums</span>
        <span class="tabular-nums text-zinc-100 font-medium">{{ stats.albums if stats.albums is not none else '—' }}</span>
    </div>
    <div class="flex items-baseline gap-1.5 text-sm">
        <span class="text-zinc-400">Scan</span>
        {% if stats.scanning %}
            <span class="text-emerald-400">running ({{ stats.scan_count }})</span>
        {% else %}
            <span class="text-zinc-500">idle</span>
        {% endif %}
    </div>
{% endif %}
