{# Artists grid — top level of the library browser. Each card drills into the
   artist's albums by swapping #lib-browse. #}
{% if not artists %}
    <div class="p-6 text-sm text-zinc-500">No artists match.</div>
{% else %}
<div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-3">
    {% for a in artists %}
    <button type="button"
            class="text-left rounded-lg border border-zinc-800 bg-zinc-900/40 p-3
                   hover:border-zinc-700 hover:bg-zinc-900 transition-colors"
            hx-get="/fragments/library/artist?name={{ a.artist_name | urlencode }}"
            hx-target="#lib-browse" hx-swap="innerHTML">
        <div class="font-medium text-zinc-100 truncate" title="{{ a.artist_name }}">{{ a.artist_name }}</div>
        <div class="text-xs text-zinc-500 mt-0.5">{{ a.album_count }} albums · {{ a.track_count }} tracks</div>
        <div class="flex flex-wrap gap-1 mt-2 text-[10px]">
            {% if a.in_library %}<span class="px-1.5 py-0.5 rounded bg-emerald-950 text-emerald-300">{{ a.in_library }} in library</span>{% endif %}
            {% if a.missing %}<span class="px-1.5 py-0.5 rounded bg-sky-950 text-sky-300">{{ a.missing }} missing</span>{% endif %}
            {% if a.blocked %}<span class="px-1.5 py-0.5 rounded bg-rose-950 text-rose-300">{{ a.blocked }} blocked</span>{% endif %}
        </div>
    </button>
    {% endfor %}
</div>
{% endif %}
