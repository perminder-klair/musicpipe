{# Shared modals — the log-modal is opened from any "view log" button
   (dashboard, runs), the tracks-modal is opened from watchlist card "♪"
   actions on the dashboard. Both are hidden by default; opened by the
   helpers in _shared_scripts.html. #}
<div id="log-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm p-4 sm:p-8"
     onclick="if(event.target===this) closeLogModal()">
    <div class="max-w-5xl mx-auto bg-zinc-950 border border-zinc-800 rounded-lg shadow-2xl flex flex-col max-h-full">
        <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800">
            <h3 class="font-medium text-zinc-100">Run log</h3>
            <button onclick="closeLogModal()" class="text-zinc-400 hover:text-zinc-100 text-sm">close ✕</button>
        </div>
        <div id="log-modal-body" class="overflow-auto p-4 flex-1">
            <div class="text-sm text-zinc-500">loading…</div>
        </div>
    </div>
</div>

<div id="tracks-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm p-4 sm:p-8"
     onclick="if(event.target===this) closeTracksModal()">
    <div class="max-w-4xl mx-auto bg-zinc-950 border border-zinc-800 rounded-lg shadow-2xl flex flex-col max-h-full">
        <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800">
            <div>
                <h3 id="tracks-modal-title" class="font-medium text-zinc-100">Tracks</h3>
                <div id="tracks-modal-sub" class="text-[11px] text-zinc-500"></div>
            </div>
            <button onclick="closeTracksModal()" class="text-zinc-400 hover:text-zinc-100 text-sm">close ✕</button>
        </div>
        <div id="tracks-modal-body" class="overflow-auto flex-1">
            <div class="p-6 text-sm text-zinc-500">loading…</div>
        </div>
    </div>
</div>
